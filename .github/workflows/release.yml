name: Build and Release

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yml"
    tags:
      - "v*"
  pull_request:
    types: [ opened, synchronize, reopened ]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/*.yml"
  release:
    types: [ published ]

jobs:

  build:
    strategy:
      matrix:
        # Slimmed-down matrix (14 platforms) combining the
        # previous 22-platform matrix with two rounds of
        # trimming:
        #   1. Drop 32-bit x86, end-of-life architectures,
        #      server-only ISAs and Android arm64 (XrayR is
        #      not a mobile app). See commit 38097ee for the
        #      full rationale on the eleven removals.
        #   2. Add back windows / freebsd / openbsd arm64
        #      because Windows on ARM (Snapdragon X Elite,
        #      Copilot+ PC) and ARM routers running FreeBSD
        #      or OpenBSD (pfSense / OPNsense on Pi 4/5,
        #      OpenBSD self-hosted) are real deployment
        #      scenarios that were previously missing. See
        #      commit 7e05a72 for the addition rationale.
        goos: [ linux, darwin, windows, freebsd, openbsd ]
        goarch: [ amd64 ]
        include:
          # macOS Apple Silicon
          - goos: darwin
            goarch: arm64
          # Linux ARMv6 (Raspberry Pi 1, Pi Zero)
          - goos: linux
            goarch: arm
            goarm: 6
          # Linux ARMv7 (Pi 2, OpenWrt routers)
          - goos: linux
            goarch: arm
            goarm: 7
          # Linux aarch64 (Pi 3/4/5, AWS Graviton, Apple
          # Silicon Linux, Ampere Altra)
          - goos: linux
            goarch: arm64
          # Linux RISC-V 64 (StarFive VisionFive, SiFive
          # HiFive, growing)
          - goos: linux
            goarch: riscv64
          # Linux MIPS64 little-endian (last Loongson
          # 2K/3A users; LoongArch is the next step)
          - goos: linux
            goarch: mips64le
          # Windows on ARM (Surface Pro X, Qualcomm X
          # Elite, Copilot+ PC — fast growing)
          - goos: windows
            goarch: arm64
          # FreeBSD ARM64 (pfSense / OPNsense on Pi 4/5
          # and Ampere Altra edge firewalls)
          - goos: freebsd
            goarch: arm64
          # OpenBSD ARM64 (Pi 4/5 self-hosted router, AWS
          # Graviton instances)
          - goos: openbsd
            goarch: arm64
      fail-fast: false

    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      GOARM: ${{ matrix.goarm }}
      CGO_ENABLED: 0
    steps:
      - name: Checkout codebase
        uses: actions/checkout@v4
      - name: Show workflow information
        id: get_filename
        run: |
          export _NAME=$(jq ".[\"$GOOS-$GOARCH$GOARM$GOMIPS\"].friendlyName" -r < .github/build/friendly-filenames.json)
          echo "GOOS: $GOOS, GOARCH: $GOARCH, GOARM: $GOARM, GOMIPS: $GOMIPS, RELEASE_NAME: $_NAME"
          echo "ASSET_NAME=$_NAME" >> $GITHUB_OUTPUT
          echo "ASSET_NAME=$_NAME" >> $GITHUB_ENV

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          # Pin to 1.25.6 to match the toolchain declared in
          # go.mod. The gvisor v0.0.0-20260109181451 release
          # uses go:build go1.25 for the go1.25 source files
          # and go:build go1.26 for the go1.26 ones, so the
          # 1.25 toolchain compiles only the go1.25 files and
          # the go1.26 ones are skipped. (The go1.26 build
          # constraint is recognised by 1.25.x; it is simply
          # not satisfied, which is the desired behaviour.)
          # With go 1.26.x the go1.25 build tag is satisfied
          # and BOTH files are compiled, redeclaring the
          # WaitReason* constants — so do not switch to 1.26
          # without also upgrading gvisor past
          # v0.0.0-20260126202813.
          go-version: '1.25.6'

      - name: Get project dependencies
        run: go mod download


      - name: Build XrayR
        run: |
          mkdir -p build_assets
          go build -v -o build_assets/XrayR -trimpath -ldflags "-s -w -buildid= -X github.com/Starktomy/XrayR/common/version.Version=${{ github.ref_name }}"

      - name: Build Mips softfloat XrayR
        if: matrix.goarch == 'mips' || matrix.goarch == 'mipsle'
        run: |
          GOMIPS=softfloat go build -v -o build_assets/XrayR_softfloat -trimpath -ldflags "-s -w -buildid= -X github.com/Starktomy/XrayR/common/version.Version=${{ github.ref_name }}"
      - name: Rename Windows XrayR
        if: matrix.goos == 'windows'
        run: |
          cd ./build_assets || exit 1
          mv XrayR XrayR.exe

      - name: Prepare to release
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 60
          retry_wait_seconds: 60
          max_attempts: 5
          command: |
            cp ${GITHUB_WORKSPACE}/README.md ./build_assets/README.md
            cp ${GITHUB_WORKSPACE}/LICENSE ./build_assets/LICENSE
            cp ${GITHUB_WORKSPACE}/release/config/dns.json ./build_assets/dns.json
            cp ${GITHUB_WORKSPACE}/release/config/route.json ./build_assets/route.json
            cp ${GITHUB_WORKSPACE}/release/config/custom_outbound.json ./build_assets/custom_outbound.json
            cp ${GITHUB_WORKSPACE}/release/config/custom_inbound.json ./build_assets/custom_inbound.json
            cp ${GITHUB_WORKSPACE}/release/config/rulelist ./build_assets/rulelist
            cp ${GITHUB_WORKSPACE}/release/config/config.yml.example ./build_assets/config.yml
            LIST=('geoip geoip geoip' 'domain-list-community dlc geosite')
            for i in "${LIST[@]}"
            do
              INFO=($(echo $i | awk 'BEGIN{FS=" ";OFS=" "} {print $1,$2,$3}'))
              DOWNLOAD_URL="https://raw.githubusercontent.com/v2fly/${INFO[0]}/release/${INFO[1]}.dat"
              FILE_NAME="${INFO[2]}.dat"
              echo -e "Downloading ${DOWNLOAD_URL}..."
              curl -L "${DOWNLOAD_URL}" -o ./build_assets/${FILE_NAME}
              echo -e "Verifying HASH key..."
              HASH="$(curl -sL "${DOWNLOAD_URL}.sha256sum" | awk -F ' ' '{print $1}')"
              [ "$(sha256sum "./build_assets/${FILE_NAME}" | awk -F ' ' '{print $1}')" == "${HASH}" ] || { echo -e "The HASH key of ${FILE_NAME} does not match cloud one."; exit 1; }
            done
      - name: Create ZIP archive
        shell: bash
        run: |
          pushd build_assets || exit 1
          touch -mt $(date +%Y01010000) *
          zip -9vr ../XrayR-$ASSET_NAME.zip .
          popd || exit 1
      - name: Change the name
        run: |
          mv build_assets XrayR-$ASSET_NAME
      - name: Upload files to Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: XrayR-${{ steps.get_filename.outputs.ASSET_NAME }}
          path: |
            ./XrayR-${{ steps.get_filename.outputs.ASSET_NAME }}/*
      - name: Upload binaries to release
        uses: svenstaro/upload-release-action@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: ./XrayR-${{ steps.get_filename.outputs.ASSET_NAME }}.zip
          tag: ${{ github.ref }}
          file_glob: true
